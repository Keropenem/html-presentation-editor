<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlideCraft Prod - Modern Presentation Editor</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;700&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div id="app">
    <!-- Sidebar: Slide List -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <i class="fa-solid fa-layer-group"></i> SlideCraft
        </div>
        <div class="sidebar-actions">
          <button id="btn-paste" class="icon-btn" title="HTMLを貼り付けてインポート"><i class="fa-solid fa-clipboard"></i></button>
          <button id="btn-import" class="icon-btn" title="HTMLファイルをインポート"><i
              class="fa-solid fa-file-import"></i></button>
        </div>
      </div>

      <div id="slide-list" class="slide-list">
        <!-- サムネイルはここに挿入されます -->
      </div>

      <div class="sidebar-footer">
        <div class="slide-counter">
          <span id="current-index">1</span> / <span id="total-slides">1</span>
        </div>
      </div>
    </aside>

    <!-- Main Content: Editor Area -->
    <main class="main-content">
      <header class="top-bar">
        <div class="file-info">
          <h1 id="presentation-title">新規プレゼンテーション</h1>
        </div>
        <div class="top-actions">
          <button id="btn-export-html" class="btn btn-secondary"><i class="fa-solid fa-file-export"></i>
            HTML書き出し</button>
          <button id="btn-print" class="btn btn-primary"><i class="fa-solid fa-print"></i> 印刷 / PDF保存</button>
        </div>
      </header>

      <div class="editor-viewport">
        <div id="slide-editor-container" class="slide-editor-container">
          <!-- 現在のスライドのシャドウホスト -->
          <div id="current-slide-host"></div>
        </div>

        <!-- 画像編集用パネル（フローティング） -->
        <div id="image-editor-panel" class="editor-panel hidden">
          <div class="panel-header">
            <span><i class="fa-solid fa-crop-simple"></i> 画像の調整</span>
            <button id="btn-close-image-panel" class="icon-btn" title="閉じる"><i class="fa-solid fa-xmark"></i></button>
          </div>
          <div class="panel-body">
            <div class="control-group">
              <label>ズーム</label>
              <input type="range" id="input-crop-zoom" min="100" max="300" value="100">
            </div>
            <div class="control-row">
              <div class="control-group">
                <label>左右位置</label>
                <input type="range" id="input-crop-x" min="-100" max="100" value="0">
              </div>
              <div class="control-group">
                <label>上下位置</label>
                <input type="range" id="input-crop-y" min="-100" max="100" value="0">
              </div>
            </div>
            <button id="btn-change-image-alt" class="btn btn-secondary full-width">
              <i class="fa-solid fa-image"></i> 画像を差し替える
            </button>
          </div>
        </div>

        <!-- テキスト編集用パネル（フローティング） -->
        <div id="text-editor-panel" class="editor-panel hidden">
          <div class="panel-header">
            <span><i class="fa-solid fa-font"></i> テキストの装飾</span>
            <button id="btn-close-text-panel" class="icon-btn" title="閉じる"><i class="fa-solid fa-xmark"></i></button>
          </div>
          <div class="panel-body">
            <div class="control-row" style="margin-bottom: 0.5rem;">
              <button id="btn-text-bold" class="btn btn-secondary" style="width: 100%;" title="太字">
                <i class="fa-solid fa-bold"></i>
              </button>
              <div class="control-group" style="flex-direction: row; align-items: center; gap: 0.5rem;">
                <label style="margin: 0;">色</label>
                <input type="color" id="input-text-color" value="#333333"
                  style="width: 100%; height: 36px; border: none; padding: 0; background: none; cursor: pointer;">
              </div>
            </div>
            <div class="control-group">
              <label>行間 (Line Height)</label>
              <input type="range" id="input-text-lineheight" min="0.8" max="2.5" step="0.1" value="1.5">
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- モーダル / オーバーレイ -->
    <!-- HTML Paste Modal -->
    <div id="paste-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>HTMLを貼り付けてインポート</h2>
          <button id="btn-close-paste-modal" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
          <p style="margin-bottom: 1rem; color: #ccc;">HTMLコードを以下に貼り付けてください。</p>
          <textarea id="paste-input" placeholder="<html>...</html>"
            style="width: 100%; height: 200px; padding: 0.8rem; background: rgba(0,0,0,0.2); border: 1px solid #444; color: white; border-radius: 4px; font-family: monospace; resize: none;"></textarea>
          <p id="paste-error-msg" style="color: #ff6b6b; font-size: 0.9rem; margin-top: 0.5rem; display: none;"></p>
        </div>
        <div class="modal-footer">
          <button id="btn-paste-cancel" class="btn btn-ghost">キャンセル</button>
          <button id="btn-paste-confirm" class="btn btn-primary">作成する</button>
        </div>
      </div>
    </div>

    <!-- HTML Export Modal -->
    <div id="export-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>HTML書き出し設定</h2>
          <button id="btn-close-export-modal" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
          <p style="margin-bottom: 1.5rem; color: #ccc;">書き出しオプションを選択してください。</p>

          <label class="checkbox-container">
            <input type="checkbox" id="check-presentation-mode" checked>
            <span class="checkmark"></span>
            プレゼンテーションモードを有効にする
            <p style="font-size: 0.8rem; color: #888; margin-left: 30px; margin-top: 5px;">
              閲覧時に「プレゼンテーション開始」ボタンが表示され、全画面表示やキーボード操作が可能になります。
            </p>
          </label>
        </div>
        <div class="modal-footer">
          <button id="btn-export-cancel" class="btn btn-ghost">キャンセル</button>
          <button id="btn-export-confirm" class="btn btn-primary">書き出す</button>
        </div>
      </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">タイトル</h2>
          <button id="btn-close-modal" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="modal-body" class="modal-body"></div>
        <div class="modal-footer">
          <button id="btn-modal-cancel" class="btn btn-ghost">キャンセル</button>
          <button id="btn-modal-confirm" class="btn btn-primary">確認</button>
        </div>
      </div>
    </div>

    <!-- 非表示の入力フィールド -->
    <input type="file" id="file-input-html" accept=".html,.htm" style="display: none;">
    <input type="file" id="file-input-image" accept="image/*" style="display: none;">

    <!-- Hidden Iframe for Printing -->
    <iframe id="print-frame"
      style="position: absolute; width: 0; height: 0; border: none; visibility: hidden;"></iframe>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
